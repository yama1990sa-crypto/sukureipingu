<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indeed 求人スクレイピングツール</title>
<style>
  :root {
    --blue: #2557a7;
    --bg: #f7f8fa;
    --border: #d9dee3;
    --warn-bg: #fff4e5;
    --warn-border: #f0ad4e;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    background: var(--bg);
    margin: 0;
    padding: 24px;
    color: #1a1a1a;
  }
  .container { max-width: 640px; margin: 0 auto; }
  h1 { font-size: 20px; margin-bottom: 4px; }
  .subtitle { color: #666; font-size: 13px; margin-bottom: 20px; }
  .warning {
    background: var(--warn-bg);
    border: 1px solid var(--warn-border);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 13px;
    line-height: 1.6;
    margin-bottom: 20px;
  }
  .card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .tab-btn {
    flex: 1;
    padding: 8px;
    border: 1px solid var(--border);
    background: #fff;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  .tab-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }
  label { display: block; font-size: 13px; font-weight: 600; margin: 12px 0 4px; }
  input[type=text], input[type=number] {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 14px;
  }
  .field-group { display: none; }
  .field-group.active { display: block; }
  .row { display: flex; gap: 12px; }
  .row > div { flex: 1; }
  button.primary {
    width: 100%;
    margin-top: 18px;
    padding: 12px;
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  button.primary:disabled { background: #9fb3cb; cursor: not-allowed; }
  #log-area {
    display: none;
    background: #111827;
    color: #d1fae5;
    font-family: "SF Mono", Menlo, monospace;
    font-size: 12px;
    padding: 14px;
    border-radius: 8px;
    height: 220px;
    overflow-y: auto;
    white-space: pre-wrap;
    line-height: 1.6;
  }
  #result {
    display: none;
    margin-top: 14px;
    text-align: center;
  }
  a.download-btn {
    display: inline-block;
    background: #1a7f37;
    color: #fff;
    padding: 10px 20px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
  }
  .error-msg { color: #c0392b; font-size: 13px; margin-top: 8px; }
</style>
</head>
<body>
<div class="container">
  <h1>Indeed 求人スクレイピングツール</h1>
  <div class="subtitle">検索条件を入力して「取得開始」を押すだけです</div>

  <div class="warning">
    <strong>ご利用にあたっての注意:</strong>
    Indeed の利用規約は自動収集(スクレイピング)を禁止しています。
    本ツールの利用は自己責任でお願いします。個人利用の範囲にとどめ、
    取得データの商用利用・再配布は避けてください。
  </div>

  <div class="card">
    <div class="tabs">
      <button type="button" class="tab-btn active" data-mode="keyword">キーワードで検索</button>
      <button type="button" class="tab-btn" data-mode="url">URLを直接指定</button>
    </div>

    <div id="field-keyword" class="field-group active">
      <div class="row">
        <div>
          <label>キーワード(職種など)</label>
          <input type="text" id="keyword" placeholder="例: エンジニア">
        </div>
        <div>
          <label>勤務地</label>
          <input type="text" id="location" placeholder="例: 神戸市">
        </div>
      </div>
    </div>

    <div id="field-url" class="field-group">
      <label>Indeed 検索結果ページのURL</label>
      <input type="text" id="url" placeholder="https://jp.indeed.com/...">
    </div>

    <label>取得ページ数(1ページ ≒ 15件、最大 {{ max_pages }} ページ)</label>
    <input type="number" id="pages" value="1" min="1" max="{{ max_pages }}">

    <button class="primary" id="start-btn" onclick="startScrape()">取得開始</button>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <div id="log-area"></div>

  <div id="result">
    <a class="download-btn" id="download-link" href="#">CSVをダウンロード</a>
  </div>
</div>

<script>
let currentMode = "keyword";
let pollTimer = null;

document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentMode = btn.dataset.mode;
    document.querySelectorAll(".field-group").forEach(g => g.classList.remove("active"));
    document.getElementById("field-" + currentMode).classList.add("active");
  });
});

function startScrape() {
  const errorEl = document.getElementById("error-msg");
  errorEl.textContent = "";

  const payload = {
    mode: currentMode,
    pages: document.getElementById("pages").value,
  };
  if (currentMode === "url") {
    payload.url = document.getElementById("url").value;
  } else {
    payload.keyword = document.getElementById("keyword").value;
    payload.location = document.getElementById("location").value;
  }

  const startBtn = document.getElementById("start-btn");
  startBtn.disabled = true;
  startBtn.textContent = "実行中…";
  document.getElementById("result").style.display = "none";
  const logArea = document.getElementById("log-area");
  logArea.style.display = "block";
  logArea.textContent = "";

  fetch("/scrape", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload),
  })
    .then(r => r.json().then(data => ({ ok: r.ok, data })))
    .then(({ ok, data }) => {
      if (!ok) {
        errorEl.textContent = data.error || "エラーが発生しました";
        resetBtn();
        return;
      }
      pollStatus(data.job_id);
    })
    .catch(e => {
      errorEl.textContent = "通信エラー: " + e;
      resetBtn();
    });
}

function pollStatus(jobId) {
  pollTimer = setInterval(() => {
    fetch("/status/" + jobId)
      .then(r => r.json())
      .then(data => {
        const logArea = document.getElementById("log-area");
        logArea.textContent = data.logs.join("\n");
        logArea.scrollTop = logArea.scrollHeight;

        if (data.status === "done") {
          clearInterval(pollTimer);
          resetBtn();
          const resultEl = document.getElementById("result");
          resultEl.style.display = "block";
          document.getElementById("download-link").href = "/download/" + jobId;
          document.getElementById("download-link").textContent =
            "CSVをダウンロード(" + data.count + "件)";
        } else if (data.status === "error") {
          clearInterval(pollTimer);
          resetBtn();
          document.getElementById("error-msg").textContent = "処理中にエラーが発生しました。ログを確認してください。";
        }
      });
  }, 1500);
}

function resetBtn() {
  const startBtn = document.getElementById("start-btn");
  startBtn.disabled = false;
  startBtn.textContent = "取得開始";
}
</script>
</body>
</html>
